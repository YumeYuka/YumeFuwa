name: Build and Push Pages Branch

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
          cache: gradle


      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean composeApp:jsBrowserDistribution

      - name: Copy stickers into dist
        run: |
          OUTPUT=composeApp/build/dist/js/productionExecutable
          if [ -d stickers ]; then
            cp -r stickers "$OUTPUT/"
          fi

      - name: Deploy GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: pages
          folder: composeApp/build/dist/js/productionExecutable
